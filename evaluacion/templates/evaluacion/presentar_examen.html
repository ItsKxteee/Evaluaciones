
{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ examen.titulo }}</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Nuestro CSS -->
    <link rel="stylesheet" href="{% static 'css/styles.css' %}">
</head>
<body class="bg-light">

<nav class="navbar navbar-dark bg-dark px-4">
    <div class="d-flex align-items-center gap-3">
        <img src="{% static 'img/logo.jpg' %}" class="logo" alt="Logo Empresa">
        <span class="navbar-brand mb-0 h1">{{ examen.titulo }}</span>
    </div>
</nav>

<div class="container mt-5">

    <div class="card shadow">
        <div class="card-body">

            <h3 class="mb-4 titulo-principal text-center">
                {{ examen.titulo }}
            </h3>

            <form method="post">
                {% csrf_token %}

                {% for p in preguntas %}
                    <div class="mb-4">
                        <h5><strong>{{ forloop.counter }}. {{ p.texto }}</strong></h5>

                        <div class="form-check">
                            <input class="form-check-input"
                                   type="radio"
                                   name="pregunta_{{ p.id }}"
                                   value="A"
                                   required>
                            <label class="form-check-label">
                                {{ p.opcion_a }}
                            </label>
                        </div>

                        <div class="form-check">
                            <input class="form-check-input"
                                   type="radio"
                                   name="pregunta_{{ p.id }}"
                                   value="B">
                            <label class="form-check-label">
                                {{ p.opcion_b }}
                            </label>
                        </div>

                        <div class="form-check">
                            <input class="form-check-input"
                                   type="radio"
                                   name="pregunta_{{ p.id }}"
                                   value="C">
                            <label class="form-check-label">
                                {{ p.opcion_c }}
                            </label>
                        </div>
                    </div>
                {% endfor %}

                <div class="text-center">
                    <button type="submit" class="btn btn-success btn-lg">
                        Enviar examen
                    </button>
                </div>

            </form>

        </div>
    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
